<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceFlow - Sistema Financeiro Avançado</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 1400px;
    margin: auto;
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 30px;
}

.header h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
}

.header p {
    opacity: 0.9;
    font-size: 1.1em;
}

/* Cards */
.card {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
}

.card h3 {
    color: #333;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Formulário */
.form-group {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
}

.input-group {
    flex: 1;
    min-width: 150px;
}

.input-group label {
    display: block;
    font-size: 0.85em;
    color: #666;
    margin-bottom: 5px;
    font-weight: 600;
}

input, select, button {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
    transition: all 0.3s ease;
    width: 100%;
}

input:focus, select:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
}

button {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    cursor: pointer;
    font-weight: 600;
    padding: 10px 20px;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(102,126,234,0.4);
}

button:active {
    transform: translateY(0);
}

/* Dashboard */
.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 20px;
}

.box {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    color: white;
    transition: transform 0.3s ease;
}

.box:hover {
    transform: translateY(-3px);
}

.box i {
    font-size: 2em;
    margin-bottom: 10px;
}

.box h4 {
    font-size: 1em;
    margin-bottom: 10px;
    opacity: 0.9;
}

.box .value {
    font-size: 2em;
    font-weight: bold;
}

.income { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
.expense { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
.total { background: linear-gradient(135deg, #4568DC 0%, #B06AB3 100%); }

/* Filtros */
.filters {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    align-items: flex-end;
}

.filters .input-group {
    flex: 1;
    min-width: 150px;
}

/* Ações */
.actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.btn-secondary {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
}

.btn-info {
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
}

/* Tabela */
.table-wrapper {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #eee;
}

th {
    background: #f8f9fa;
    color: #333;
    font-weight: 600;
}

tr:hover {
    background: #f8f9fa;
}

.delete-btn {
    background: #dc3545;
    padding: 5px 10px;
    font-size: 12px;
}

.delete-btn:hover {
    background: #c82333;
}

.badge {
    padding: 4px 8px;
    border-radius: 20px;
    font-size: 0.85em;
    font-weight: 600;
}

.badge-income {
    background: #d4edda;
    color: #155724;
}

.badge-expense {
    background: #f8d7da;
    color: #721c24;
}

/* Gráfico */
.chart-container {
    max-width: 500px;
    margin: 0 auto;
}

/* Estatísticas */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-top: 15px;
}

.stat-card {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    color: white;
}

.stat-card h4 {
    font-size: 0.9em;
    margin-bottom: 8px;
    opacity: 0.9;
}

.stat-card .stat-value {
    font-size: 1.5em;
    font-weight: bold;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal-content {
    background: white;
    padding: 30px;
    border-radius: 15px;
    max-width: 500px;
    width: 90%;
}

.modal-content h3 {
    margin-bottom: 20px;
}

/* Responsividade */
@media (max-width: 768px) {
    .form-group {
        flex-direction: column;
    }
    
    .input-group {
        width: 100%;
    }
    
    .dashboard {
        grid-template-columns: 1fr;
    }
    
    th, td {
        padding: 8px;
        font-size: 12px;
    }
}

/* Animações */
@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card {
    animation: slideIn 0.5s ease;
}

/* Alertas personalizados */
.alert {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 15px 20px;
    border-radius: 10px;
    color: white;
    font-weight: 500;
    z-index: 2000;
    animation: slideIn 0.3s ease;
}

.alert-success {
    background: #28a745;
}

.alert-error {
    background: #dc3545;
}

.alert-info {
    background: #17a2b8;
}
</style>
</head>

<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-chart-line"></i> FinanceFlow</h1>
        <p>Gerencie suas finanças de forma inteligente</p>
    </div>

    <!-- Formulário de Adição -->
    <div class="card">
        <h3><i class="fas fa-plus-circle"></i> Nova Transação</h3>
        <div class="form-group">
            <div class="input-group">
                <label><i class="fas fa-tag"></i> Descrição</label>
                <input id="desc" placeholder="Ex: Salário, Compras...">
            </div>
            <div class="input-group">
                <label><i class="fas fa-dollar-sign"></i> Valor</label>
                <input type="number" id="value" placeholder="0,00" step="0.01">
            </div>
            <div class="input-group">
                <label><i class="fas fa-calendar"></i> Data</label>
                <input type="date" id="date">
            </div>
            <div class="input-group">
                <label><i class="fas fa-folder"></i> Categoria</label>
                <select id="category">
                    <option>Alimentação</option>
                    <option>Transporte</option>
                    <option>Moradia</option>
                    <option>Lazer</option>
                    <option>Saúde</option>
                    <option>Educação</option>
                    <option>Salário</option>
                    <option>Investimentos</option>
                    <option>Outros</option>
                </select>
            </div>
            <div class="input-group">
                <label><i class="fas fa-chart-simple"></i> Tipo</label>
                <select id="type">
                    <option value="income">💰 Receita</option>
                    <option value="expense">💸 Despesa</option>
                </select>
            </div>
            <div class="input-group">
                <button onclick="addTransaction()">
                    <i class="fas fa-save"></i> Adicionar
                </button>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard">
        <div class="box income">
            <i class="fas fa-arrow-up"></i>
            <h4>Total Receitas</h4>
            <div class="value" id="inc">R$ 0,00</div>
        </div>
        <div class="box expense">
            <i class="fas fa-arrow-down"></i>
            <h4>Total Despesas</h4>
            <div class="value" id="exp">R$ 0,00</div>
        </div>
        <div class="box total">
            <i class="fas fa-balance-scale"></i>
            <h4>Saldo Total</h4>
            <div class="value" id="tot">R$ 0,00</div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="card">
        <h3><i class="fas fa-filter"></i> Filtros Avançados</h3>
        <div class="filters">
            <div class="input-group">
                <label><i class="fas fa-calendar-alt"></i> Data Início</label>
                <input type="date" id="start">
            </div>
            <div class="input-group">
                <label><i class="fas fa-calendar-alt"></i> Data Fim</label>
                <input type="date" id="end">
            </div>
            <div class="input-group">
                <label><i class="fas fa-tag"></i> Categoria</label>
                <select id="filterCategory">
                    <option value="">Todas</option>
                    <option>Alimentação</option>
                    <option>Transporte</option>
                    <option>Moradia</option>
                    <option>Lazer</option>
                    <option>Saúde</option>
                    <option>Educação</option>
                    <option>Salário</option>
                    <option>Investimentos</option>
                    <option>Outros</option>
                </select>
            </div>
            <div class="input-group">
                <label><i class="fas fa-chart-simple"></i> Tipo</label>
                <select id="filterType">
                    <option value="">Todos</option>
                    <option value="income">Receitas</option>
                    <option value="expense">Despesas</option>
                </select>
            </div>
            <div class="input-group">
                <button onclick="applyFilters()" class="btn-info">
                    <i class="fas fa-search"></i> Aplicar
                </button>
                <button onclick="clearFilters()">
                    <i class="fas fa-undo"></i> Limpar
                </button>
            </div>
        </div>
    </div>

    <!-- Ações -->
    <div class="card">
        <h3><i class="fas fa-download"></i> Exportar Dados</h3>
        <div class="actions">
            <button onclick="exportCSV()" class="btn-secondary">
                <i class="fas fa-file-excel"></i> Exportar CSV
            </button>
            <button onclick="exportPDF()" class="btn-secondary">
                <i class="fas fa-file-pdf"></i> Exportar PDF
            </button>
            <button onclick="exportJSON()" class="btn-secondary">
                <i class="fas fa-code"></i> Exportar JSON
            </button>
            <button onclick="importData()" class="btn-info">
                <i class="fas fa-upload"></i> Importar Dados
            </button>
            <button onclick="clearAllData()" style="background: #dc3545;">
                <i class="fas fa-trash-alt"></i> Limpar Tudo
            </button>
        </div>
    </div>

    <!-- Gráfico e Estatísticas -->
    <div class="card">
        <h3><i class="fas fa-chart-pie"></i> Análise por Categoria</h3>
        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>
        
        <div class="stats-grid" id="statsGrid"></div>
    </div>

    <!-- Lista de Transações -->
    <div class="card">
        <h3><i class="fas fa-list"></i> Histórico de Transações</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th>Data</th>
                        <th>Categoria</th>
                        <th>Tipo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal de Importação -->
<div id="importModal" class="modal">
    <div class="modal-content">
        <h3>Importar Dados</h3>
        <input type="file" id="importFile" accept=".json">
        <br><br>
        <button onclick="processImport()">Importar</button>
        <button onclick="closeModal()" style="background: #6c757d;">Cancelar</button>
    </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("fin")) || [];
let chart;
let currentFilters = {
    start: "",
    end: "",
    category: "",
    type: ""
};

// Elementos DOM
const incEl = document.getElementById("inc");
const expEl = document.getElementById("exp");
const totEl = document.getElementById("tot");
const descInput = document.getElementById("desc");
const valueInput = document.getElementById("value");
const dateInput = document.getElementById("date");
const categorySelect = document.getElementById("category");
const typeSelect = document.getElementById("type");

// Função para mostrar alertas
function showAlert(message, type = "success") {
    const alert = document.createElement("div");
    alert.className = `alert alert-${type}`;
    alert.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
    document.body.appendChild(alert);
    
    setTimeout(() => {
        alert.remove();
    }, 3000);
}

// Salvar no localStorage
function save() {
    localStorage.setItem("fin", JSON.stringify(data));
}

// Adicionar transação
function addTransaction() {
    const obj = {
        id: Date.now(),
        desc: descInput.value.trim(),
        value: parseFloat(valueInput.value),
        date: dateInput.value,
        category: categorySelect.value,
        type: typeSelect.value
    };

    if (!obj.desc) {
        showAlert("Por favor, preencha a descrição!", "error");
        return;
    }
    if (isNaN(obj.value) || obj.value <= 0) {
        showAlert("Por favor, informe um valor válido!", "error");
        return;
    }
    if (!obj.date) {
        showAlert("Por favor, selecione uma data!", "error");
        return;
    }

    data.push(obj);
    save();
    render();
    
    // Limpar campos
    descInput.value = "";
    valueInput.value = "";
    dateInput.value = "";
    
    showAlert("Transação adicionada com sucesso!");
}

// Remover transação
function remove(id) {
    if (confirm("Tem certeza que deseja excluir esta transação?")) {
        data = data.filter(x => x.id !== id);
        save();
        render();
        showAlert("Transação removida com sucesso!");
    }
}

// Editar transação
function edit(id) {
    const transaction = data.find(x => x.id === id);
    if (transaction) {
        descInput.value = transaction.desc;
        valueInput.value = transaction.value;
        dateInput.value = transaction.date;
        categorySelect.value = transaction.category;
        typeSelect.value = transaction.type;
        
        remove(id);
        showAlert("Edite os dados e clique em adicionar para salvar as alterações!", "info");
    }
}

// Aplicar filtros
function applyFilters() {
    currentFilters.start = document.getElementById("start").value;
    currentFilters.end = document.getElementById("end").value;
    currentFilters.category = document.getElementById("filterCategory").value;
    currentFilters.type = document.getElementById("filterType").value;
    render();
}

// Limpar filtros
function clearFilters() {
    document.getElementById("start").value = "";
    document.getElementById("end").value = "";
    document.getElementById("filterCategory").value = "";
    document.getElementById("filterType").value = "";
    currentFilters = { start: "", end: "", category: "", type: "" };
    render();
}

// Filtrar dados
function filterData() {
    return data.filter(t => {
        if (currentFilters.start && t.date < currentFilters.start) return false;
        if (currentFilters.end && t.date > currentFilters.end) return false;
        if (currentFilters.category && t.category !== currentFilters.category) return false;
        if (currentFilters.type && t.type !== currentFilters.type) return false;
        return true;
    });
}

// Renderizar tudo
function render() {
    const tbody = document.getElementById("list");
    tbody.innerHTML = "";

    let inc = 0, exp = 0;
    const categories = {};
    const filtered = filterData();

    filtered.forEach(t => {
        if (t.type === "income") {
            inc += t.value;
        } else {
            exp += t.value;
        }

        if (!categories[t.category]) categories[t.category] = 0;
        categories[t.category] += t.value;

        const row = tbody.insertRow();
        row.insertCell(0).innerHTML = `<i class="fas ${t.type === 'income' ? 'fa-arrow-up text-success' : 'fa-arrow-down text-danger'}"></i> ${t.desc}`;
        row.insertCell(1).innerHTML = `R$ ${t.value.toFixed(2)}`;
        row.insertCell(2).innerHTML = formatDate(t.date);
        row.insertCell(3).innerHTML = `<span class="badge badge-${t.type === 'income' ? 'income' : 'expense'}">${t.category}</span>`;
        row.insertCell(4).innerHTML = `<span class="badge badge-${t.type === 'income' ? 'income' : 'expense'}">${t.type === 'income' ? '💰 Receita' : '💸 Despesa'}</span>`;
        row.insertCell(5).innerHTML = `
            <button onclick="edit(${t.id})" style="background: #ffc107; margin-right: 5px;">
                <i class="fas fa-edit"></i>
            </button>
            <button onclick="remove(${t.id})" class="delete-btn">
                <i class="fas fa-trash"></i>
            </button>
        `;
    });

    incEl.innerHTML = `R$ ${inc.toFixed(2)}`;
    expEl.innerHTML = `R$ ${exp.toFixed(2)}`;
    totEl.innerHTML = `R$ ${(inc - exp).toFixed(2)}`;
    totEl.parentElement.style.background = (inc - exp) >= 0 ? 
        "linear-gradient(135deg, #11998e 0%, #38ef7d 100%)" : 
        "linear-gradient(135deg, #eb3349 0%, #f45c43 100%)";

    updateChart(categories);
    updateStats(inc, exp, filtered.length);
}

// Atualizar estatísticas
function updateStats(inc, exp, totalTransactions) {
    const statsGrid = document.getElementById("statsGrid");
    const savingsRate = inc > 0 ? ((inc - exp) / inc * 100).toFixed(1) : 0;
    
    statsGrid.innerHTML = `
        <div class="stat-card">
            <h4>Total Transações</h4>
            <div class="stat-value">${totalTransactions}</div>
        </div>
        <div class="stat-card">
            <h4>Taxa de Economia</h4>
            <div class="stat-value">${savingsRate}%</div>
        </div>
        <div class="stat-card">
            <h4>Média por Transação</h4>
            <div class="stat-value">R$ ${((inc + exp) / (totalTransactions || 1)).toFixed(2)}</div>
        </div>
    `;
}

// Formatar data
function formatDate(dateStr) {
    if (!dateStr) return "";
    const [year, month, day] = dateStr.split("-");
    return `${day}/${month}/${year}`;
}

// Atualizar gráfico
function updateChart(categories) {
    const ctx = document.getElementById("chart");
    if (chart) chart.destroy();

    if (Object.keys(categories).length === 0) {
        chart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Sem dados'],
                datasets: [{ data: [1], backgroundColor: ['#ccc'] }]
            },
            options: {
                plugins: { legend: { labels: { color: '#333' } } }
            }
        });
        return;
    }

    chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: Object.keys(categories),
            datasets: [{
                data: Object.values(categories),
                backgroundColor: [
                    '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', 
                    '#9966FF', '#FF9F40', '#FF6384', '#C9CBCF'
                ]
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom', labels: { color: '#333' } }
            }
        }
    });
}

// Exportar CSV
function exportCSV() {
    let csv = "Descrição,Valor,Data,Categoria,Tipo\n";
    data.forEach(t => {
        csv += `"${t.desc}",${t.value},${t.date},${t.category},${t.type === 'income' ? 'Receita' : 'Despesa'}\n`;
    });

    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `financeiro_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
    showAlert("CSV exportado com sucesso!");
}

// Exportar JSON
function exportJSON() {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `financeiro_${new Date().toISOString().split('T')[0]}.json`;
    link.click();
    showAlert("JSON exportado com sucesso!");
}

// Exportar PDF
function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    doc.setFontSize(18);
    doc.text("Relatório Financeiro", 20, 20);
    doc.setFontSize(12);
    doc.text(`Gerado em: ${new Date().toLocaleString()}`, 20, 30);
    
    let y = 40;
    data.slice(0, 30).forEach(t => {
        if (y > 280) {
            doc.addPage();
            y = 20;
        }
        doc.text(`${t.desc} - R$ ${t.value.toFixed(2)} - ${t.date} - ${t.category}`, 20, y);
        y += 8;
    });
    
    doc.save(`financeiro_${new Date().toISOString().split('T')[0]}.pdf`);
    showAlert("PDF exportado com sucesso!");
}

// Importar dados
function importData() {
    document.getElementById("importModal").style.display = "flex";
}

function processImport() {
    const file = document.getElementById("importFile").files[0];
    if (!file) {
        showAlert("Selecione um arquivo JSON!", "error");
        return;
    }
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const imported = JSON.parse(e.target.result);
            if (Array.isArray(imported)) {
                data = [...data, ...imported];
                save();
                render();
                showAlert(`${imported.length} transações importadas com sucesso!`);
                closeModal();
            } else {
                showAlert("Arquivo inválido!", "error");
            }
        } catch (error) {
            showAlert("Erro ao ler o arquivo!", "error");
        }
    };
    reader.readAsText(file);
}

function closeModal() {
    document.getElementById("importModal").style.display = "none";
}

// Limpar todos os dados
function clearAllData() {
    if (confirm("⚠️ ATENÇÃO: Isso irá apagar TODOS os dados! Tem certeza?")) {
        data = [];
        save();
        render();
        showAlert("Todos os dados foram removidos!");
    }
}

// Fechar modal ao clicar fora
window.onclick = function(event) {
    const modal = document.getElementById("importModal");
    if (event.target === modal) {
        closeModal();
    }
}

// Inicializar com data atual
if (!dateInput.value) {
    dateInput.value = new Date().toISOString().split('T')[0];
}

render();
</script>

</body>
